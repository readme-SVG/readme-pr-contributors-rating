<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub PR Badge Generator</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

         :root {
            --gh-bg: #f6f8fa;
            --gh-canvas: #ffffff;
            --gh-canvas-subtle: #f6f8fa;
            --gh-border: #d0d7de;
            --gh-text: #1f2328;
            --gh-muted: #57606a;
            --gh-accent: #0969da;
            --gh-success: #238636;
            --gh-success-hover: #2ea043;
            --gh-btn-bg: #f6f8fa;
            --gh-btn-hover: #f3f4f6;
            --gh-shadow: 0 1px 2px rgba(31, 35, 40, 0.06);
            --gh-focus: rgba(9, 105, 218, 0.3);
        }

        html[data-theme="dark"] {
            --gh-bg: #0d1117;
            --gh-canvas: #161b22;
            --gh-canvas-subtle: #010409;
            --gh-border: #30363d;
            --gh-text: #e6edf3;
            --gh-muted: #8b949e;
            --gh-accent: #2f81f7;
            --gh-success: #238636;
            --gh-success-hover: #2ea043;
            --gh-btn-bg: #21262d;
            --gh-btn-hover: #30363d;
            --gh-shadow: 0 1px 2px rgba(1, 4, 9, 0.4);
            --gh-focus: rgba(47, 129, 247, 0.35);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
            background: var(--gh-bg);
            color: var(--gh-text);
            min-height: 100vh;
            line-height: 1.5;
        }

        .header {
            background: var(--gh-canvas);
            border-bottom: 1px solid var(--gh-border);
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        .repo-crumbs {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
            font-size: 14px;
        }

        .repo-crumbs svg {
            color: var(--gh-text);
            flex: 0 0 auto;
        }

        .repo-crumb-link {
            color: var(--gh-accent);
            text-decoration: none;
            font-weight: 500;
        }

        .repo-crumb-link.repo-name {
            color: var(--gh-text);
            font-weight: 600;
        }

        .repo-crumb-link:hover { text-decoration: underline; }

        .repo-divider {
            color: var(--gh-muted);
            user-select: none;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .theme-toggle {
            width: 32px;
            height: 32px;
            border: 1px solid var(--gh-border);
            border-radius: 6px;
            background: var(--gh-btn-bg);
            color: var(--gh-text);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .theme-toggle:hover { background: var(--gh-btn-hover); }
        .theme-toggle .icon-sun { display: none; }
        html[data-theme="dark"] .theme-toggle .icon-sun { display: inline; }
        html[data-theme="dark"] .theme-toggle .icon-moon { display: none; }

        .lang-select,
        .form-input,
        .btn-copy,
        .btn-primary,
        .order-btn,
        .theme-toggle {
            transition: background-color 0.12s ease, border-color 0.12s ease, box-shadow 0.12s ease;
        }

        .form-input,
        .lang-select,
        .btn-copy,
        .order-btn,
        .btn-primary {
            appearance: none;
        }

        .lang-select,
        .form-input,
        .btn-copy,
        .btn-primary {
            border-radius: 6px;
            border: 1px solid var(--gh-border);
            font-size: 14px;
        }

        .lang-select,
        .form-input {
            width: 100%;
            background: var(--gh-canvas);
            color: var(--gh-text);
            padding: 7px 10px;
        }

        .lang-select {
            width: auto;
            min-width: 115px;
            cursor: pointer;
        }

                @media (max-width: 740px) {
            .header {
                flex-direction: column;
                align-items: flex-start;
            }

            .header-actions {
                width: 100%;
                justify-content: space-between;
            }
        }

        .main {
            max-width: 1320px;
            margin: 20px auto;
            padding: 0 20px 20px;
            display: grid;
            grid-template-columns: 470px 1fr;
            gap: 20px;
            align-items: start;
        }

        @media (max-width: 1024px) {
            .main { grid-template-columns: 1fr; }
        }

        .panel {
            background: var(--gh-canvas);
            border: 1px solid var(--gh-border);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: var(--gh-shadow);
        }

        .panel-header {
            padding: 12px 16px;
            border-bottom: 1px solid var(--gh-border);
            font-size: 14px;
            font-weight: 600;
            color: var(--gh-text);
            background: var(--gh-canvas-subtle);
        }

        .panel-body { padding: 16px; }

        .config-sections {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .config-section {
            border: 1px solid var(--gh-border);
            border-radius: 8px;
            background: var(--gh-canvas);
            overflow: hidden;
        }

        .config-section summary {
            list-style: none;
            cursor: pointer;
            padding: 12px 14px;
            font-size: 13px;
            font-weight: 600;
            color: var(--gh-text);
            background: var(--gh-canvas-subtle);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .config-section summary::-webkit-details-marker { display: none; }
        .config-section summary::after {
            content: '▾';
            color: var(--gh-muted);
            font-size: 12px;
            transform: rotate(-90deg);
            transition: transform 0.18s ease;
        }

        .config-section[open] summary::after { transform: rotate(0deg); }
        .section-body { padding: 14px; }

        .form-group { margin-bottom: 14px; }
        .form-group:last-child { margin-bottom: 0; }

        .form-label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--gh-muted);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.02em;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
        }

        @media (max-width: 540px) {
            .form-row { grid-template-columns: 1fr; }
        }

        .form-input:focus,
        .lang-select:focus,
        .color-hex:focus {
            outline: none;
            border-color: var(--gh-accent);
            box-shadow: 0 0 0 3px var(--gh-focus);
        }

        .checkbox-stack {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--gh-text);
            font-size: 14px;
        }

        .checkbox-row input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--gh-success);
        }

        .column-order-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .column-order-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid var(--gh-border);
            border-radius: 6px;
            padding: 8px 10px;
            background: var(--gh-canvas-subtle);
        }

        .column-order-item .checkbox-row {
            gap: 10px;
            margin: 0;
        }

        .order-actions {
            display: inline-flex;
            gap: 6px;
        }

        .order-btn {
            border: 1px solid var(--gh-border);
            background: var(--gh-canvas);
            color: var(--gh-text);
            border-radius: 6px;
            width: 28px;
            height: 28px;
            cursor: pointer;
            font-size: 12px;
            line-height: 1;
        }

        .order-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .color-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .color-input {
            width: 36px;
            height: 36px;
            border: 1px solid var(--gh-border);
            border-radius: 6px;
            background: var(--gh-canvas);
            cursor: pointer;
            padding: 2px;
        }

        .color-hex {
            width: 100%;
            background: var(--gh-canvas);
            border: 1px solid var(--gh-border);
            border-radius: 6px;
            color: var(--gh-text);
            padding: 8px 10px;
            font-size: 13px;
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        }

        .btn-primary {
            width: 100%;
            padding: 9px 14px;
            background: var(--gh-success);
            border-color: rgba(27, 31, 36, 0.15);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            margin-top: 12px;
        }

        .btn-primary:hover { background: var(--gh-success-hover); }
        .btn-primary:disabled { opacity: 0.65; cursor: not-allowed; }

        .preview-area {
            background: var(--gh-bg);
            border: 1px solid var(--gh-border);
            border-radius: 8px;
            padding: 16px;
            min-height: 220px;
            max-height: 580px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: auto;
            position: relative;
        }

        .preview-area img { max-width: 100%; display: block; }

        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid #d0d7de;
            border-top-color: #0969da;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .error-msg {
            color: #cf222e;
            font-size: 13px;
            padding: 8px 12px;
            background: #ffebe9;
            border: 1px solid #ff8182;
            border-radius: 6px;
        }

        .markdown-section { margin-top: 14px; }

        .markdown-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .markdown-header span {
            font-size: 13px;
            color: var(--gh-muted);
            font-weight: 600;
        }

        .btn-copy {
            background: var(--gh-btn-bg);
            color: var(--gh-text);
            padding: 6px 10px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-copy:hover { background: var(--gh-btn-hover); }
        .btn-copy.copied { background: #1f883d; color: #fff; border-color: #1f883d; }

        .code-block {
            background: var(--gh-canvas-subtle);
            border: 1px solid var(--gh-border);
            border-radius: 8px;
            padding: 12px;
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            font-size: 12px;
            color: var(--gh-text);
            word-break: break-all;
            line-height: 1.5;
        }
    </style>
</head>
<body>
<header class="header">
    <div class="repo-crumbs">
        <svg aria-hidden="true" height="24" viewBox="0 0 16 16" version="1.1" width="24" fill="currentColor">
            <path d="M8 0C3.58 0 0 3.58 0 8a8.013 8.013 0 0 0 5.47 7.59c.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.5-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82A7.65 7.65 0 0 1 8 4.84c.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8Z"></path>
        </svg>
        <a class="repo-crumb-link" href="https://github.com/readme-SVG" target="_blank" rel="noreferrer">readme-SVG</a>
        <span class="repo-divider">/</span>
        <a class="repo-crumb-link repo-name" href="https://github.com/readme-SVG/readme-pr-contributors-rating" target="_blank" rel="noreferrer">readme-pr-contributors-rating</a>
    </div>
    <div class="header-actions">
        <button class="theme-toggle" id="themeToggle" type="button" aria-label="Toggle color theme" title="Toggle color theme">
            <svg class="icon-moon" aria-hidden="true" width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M9.598 1.591a.75.75 0 0 1 .785.175 6.5 6.5 0 1 0 3.851 5.968.75.75 0 0 1 1.464-.28 8 8 0 1 1-6.315-7.863.75.75 0 0 1 .215 1.44Z"></path></svg>
            <svg class="icon-sun" aria-hidden="true" width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 10.5a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5ZM8 0a.75.75 0 0 1 .75.75V2a.75.75 0 0 1-1.5 0V.75A.75.75 0 0 1 8 0Zm0 14a.75.75 0 0 1 .75.75V16a.75.75 0 0 1-1.5 0v-1.25A.75.75 0 0 1 8 14Zm8-6a.75.75 0 0 1-.75.75H14a.75.75 0 0 1 0-1.5h1.25A.75.75 0 0 1 16 8ZM2 8a.75.75 0 0 1-.75.75H0a.75.75 0 0 1 0-1.5h1.25A.75.75 0 0 1 2 8Zm11.03 4.28a.75.75 0 0 1 1.06 1.06l-.884.884a.75.75 0 1 1-1.06-1.06l.884-.884ZM3.914 2.166a.75.75 0 0 1 1.06 0l.884.884a.75.75 0 1 1-1.06 1.06l-.884-.884a.75.75 0 0 1 0-1.06Zm9.176 0a.75.75 0 0 1 0 1.06l-.884.884a.75.75 0 0 1-1.06-1.06l.884-.884a.75.75 0 0 1 1.06 0ZM3.03 12.28a.75.75 0 0 1 0 1.06l-.884.884a.75.75 0 1 1-1.06-1.06l.884-.884a.75.75 0 0 1 1.06 0Z"></path></svg>
        </button>
        <select class="lang-select" id="langSelect" onchange="switchLanguage(this.value)">
        <option value="en">English</option>
        <option value="zh-CN">中文</option>
        <option value="es">Español</option>
        <option value="fr">Français</option>
        <option value="pt">Português</option>
        <option value="ru">Русский</option>
        <option value="ja">日本語</option>
        <option value="de">Deutsch</option>
        <option value="uk">Українська</option>
        <option value="pl">Polski</option>
        <option value="nl">Nederlands</option>
        <option value="kk">Қазақша</option>
        <option value="sv">Svenska</option>
        <option value="cs">Čeština</option>
    </select>
    </div>
</header>

<div class="main">
    <div class="panel">
        <div class="panel-header" data-i18n="configTitle">Configuration</div>
        <div class="panel-body">
            <div class="config-sections">
                <details class="config-section" open>
                    <summary>General</summary>
                    <div class="section-body">
                        <div class="form-group">
                            <label class="form-label" for="username" data-i18n="usernameLabel">GitHub Username</label>
                            <input class="form-input" type="text" id="username" placeholder="username" value="OstinUA">
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label" for="limit" data-i18n="limitLabel">Number of PRs</label>
                                <input class="form-input" type="number" id="limit" value="7" min="1" max="15">
                            </div>
                            <div class="form-group">
                                <label class="form-label" for="themePreset" data-i18n="themeLabel">Theme</label>
                                <select class="form-input" id="themePreset" onchange="applyThemePreset(this.value)">
                                    <option value="dark">GitHub Dark</option>
                                    <option value="light">GitHub Light</option>
                                    <option value="dimmed">GitHub Dimmed</option>
                                    <option value="night">Night Blue</option>
                                    <option value="transparent">Transparent</option>
                                    <option value="custom">Custom</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="customTitle" data-i18n="customTitleLabel">Custom title</label>
                            <input class="form-input" type="text" id="customTitle" placeholder="Leave empty for default" maxlength="80">
                        </div>

                        <div class="checkbox-stack">
                            <div class="checkbox-row">
                                <input type="checkbox" id="uniqueRepos">
                                <label for="uniqueRepos" data-i18n="uniqueReposLabel">Show only unique repositories</label>
                            </div>
                            <div class="checkbox-row">
                                <input type="checkbox" id="showRejected">
                                <label for="showRejected" data-i18n="showRejectedLabel">Show rejected PRs</label>
                            </div>
                        </div>

                        <div class="form-group" style="margin-top:14px;">
                            <label class="form-label" for="repoNameFormat" data-i18n="repoNameFormatLabel">Repository name format</label>
                            <select class="form-input" id="repoNameFormat">
                                <option value="full" data-i18n="repoNameFormatFull">Full Name (owner/repo)</option>
                                <option value="short" data-i18n="repoNameFormatShort">Short Name (repo)</option>
                            </select>
                        </div>
                    </div>
                </details>

                <details class="config-section">
                    <summary>Columns</summary>
                    <div class="section-body">
                        <div class="form-group">
                            <label class="form-label" data-i18n="columnOrderLabel">Column Order</label>
                            <div class="column-order-list" id="columnOrderList"></div>
                        </div>
                    </div>
                </details>

                <details class="config-section">
                    <summary>Dimensions</summary>
                    <div class="section-body">
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label" for="repoWidth" data-i18n="repoWidthLabel">Repo Width</label>
                                <input class="form-input" type="number" id="repoWidth" value="180" min="60" max="500">
                            </div>
                            <div class="form-group">
                                <label class="form-label" for="langWidth" data-i18n="langWidthLabel">Language Width</label>
                                <input class="form-input" type="number" id="langWidth" value="80" min="60" max="300">
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label" for="prWidth" data-i18n="prWidthLabel">PR Width</label>
                                <input class="form-input" type="number" id="prWidth" value="320" min="100" max="900">
                            </div>
                            <div class="form-group">
                                <label class="form-label" for="dateWidth" data-i18n="dateWidthLabel">Date Width</label>
                                <input class="form-input" type="number" id="dateWidth" value="90" min="60" max="300">
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label" for="changesWidth" data-i18n="changesWidthLabel">Changes Width</label>
                                <input class="form-input" type="number" id="changesWidth" value="100" min="70" max="300">
                            </div>
                            <div class="form-group">
                                <label class="form-label" for="starsWidth" data-i18n="starsWidthLabel">Stars Width</label>
                                <input class="form-input" type="number" id="starsWidth" value="60" min="50" max="240">
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label" for="badgeWidth" data-i18n="badgeWidthLabel">Badge width</label>
                                <input class="form-input" type="number" id="badgeWidth" value="830" min="700" max="1400">
                            </div>
                            <div class="form-group">
                                <label class="form-label" for="rowHeight" data-i18n="rowHeightLabel">Row height</label>
                                <input class="form-input" type="number" id="rowHeight" value="40" min="30" max="60">
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="previewHeight" data-i18n="previewHeightLabel">Preview window height</label>
                            <input class="form-input" type="number" id="previewHeight" value="220" min="120" max="580">
                        </div>
                    </div>
                </details>

                <details class="config-section">
                    <summary>Colors</summary>
                    <div class="section-body">
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label" for="bgColor" data-i18n="bgColorLabel">Background</label>
                                <div class="color-group">
                                    <input type="color" class="color-input" id="bgColorPicker" value="#0d1117">
                                    <input type="text" class="color-hex" id="bgColor" value="0d1117" maxlength="6">
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="form-label" for="textColor" data-i18n="textColorLabel">Text</label>
                                <div class="color-group">
                                    <input type="color" class="color-input" id="textColorPicker" value="#c9d1d9">
                                    <input type="text" class="color-hex" id="textColor" value="c9d1d9" maxlength="6">
                                </div>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label" for="titleColor" data-i18n="titleColorLabel">Title</label>
                                <div class="color-group">
                                    <input type="color" class="color-input" id="titleColorPicker" value="#58a6ff">
                                    <input type="text" class="color-hex" id="titleColor" value="58a6ff" maxlength="6">
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="form-label" for="mutedColor" data-i18n="mutedColorLabel">Muted text</label>
                                <div class="color-group">
                                    <input type="color" class="color-input" id="mutedColorPicker" value="#8b949e">
                                    <input type="text" class="color-hex" id="mutedColor" value="8b949e" maxlength="6">
                                </div>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label" for="starColor" data-i18n="starColorLabel">Star color</label>
                                <div class="color-group">
                                    <input type="color" class="color-input" id="starColorPicker" value="#e3b341">
                                    <input type="text" class="color-hex" id="starColor" value="e3b341" maxlength="6">
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="form-label" for="borderColor" data-i18n="borderColorLabel">Border color</label>
                                <div class="color-group">
                                    <input type="color" class="color-input" id="borderColorPicker" value="#30363d">
                                    <input type="text" class="color-hex" id="borderColor" value="30363d" maxlength="6">
                                </div>
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="shadowColor" data-i18n="shadowColorLabel">Shadow color</label>
                            <div class="color-group">
                                <input type="color" class="color-input" id="shadowColorPicker" value="#000000">
                                <input type="text" class="color-hex" id="shadowColor" value="000000" maxlength="6">
                            </div>
                        </div>
                    </div>
                </details>
            </div>

            <div class="form-group">
                <button class="btn-primary" id="generateBtn" onclick="generate()">
                    <span data-i18n="generateBtn">Generate Badge</span>
                </button>
            </div>
        </div>
    </div>

    <div class="panel">
        <div class="panel-header" data-i18n="previewTitle">Preview</div>
        <div class="panel-body">
            <div class="preview-area" id="previewArea">
                <img id="badge" alt="Top PR Stats" style="display:none;">
                <div class="spinner" id="spinner" style="display:none;"></div>
                <span id="previewPlaceholder" style="color:var(--gh-muted);font-size:14px;" data-i18n="previewPlaceholder">Click "Generate Badge" to preview</span>
            </div>

            <div class="markdown-section">
                <div class="markdown-header">
                    <span data-i18n="markdownLabel">Markdown for README.md</span>
                    <button class="btn-copy" id="copyBtn" onclick="copyMarkdown()">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M0 6.75C0 5.784.784 5 1.75 5h1.5a.75.75 0 010 1.5h-1.5a.25.25 0 00-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 00.25-.25v-1.5a.75.75 0 011.5 0v1.5A1.75 1.75 0 019.25 16h-7.5A1.75 1.75 0 010 14.25v-7.5z"/><path d="M5 1.75C5 .784 5.784 0 6.75 0h7.5C15.216 0 16 .784 16 1.75v7.5A1.75 1.75 0 0114.25 11h-7.5A1.75 1.75 0 015 9.25v-7.5zm1.75-.25a.25.25 0 00-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 00.25-.25v-7.5a.25.25 0 00-.25-.25h-7.5z"/></svg>
                        <span data-i18n="copyBtn">Copy</span>
                    </button>
                </div>
                <div class="code-block" id="markdownCode">-</div>
            </div>
        </div>
    </div>
</div>

<script src="./i18n/validate.js"></script>
<script src="./i18n/en.js"></script>
<script src="./i18n/zh-CN.js"></script>
<script src="./i18n/es.js"></script>
<script src="./i18n/fr.js"></script>
<script src="./i18n/pt.js"></script>
<script src="./i18n/ru.js"></script>
<script src="./i18n/ja.js"></script>
<script src="./i18n/de.js"></script>
<script src="./i18n/uk.js"></script>
<script src="./i18n/pl.js"></script>
<script src="./i18n/nl.js"></script>
<script src="./i18n/kk.js"></script>
<script src="./i18n/sv.js"></script>
<script src="./i18n/cs.js"></script>

<script>
const i18n = window.__I18N;
window.validateI18nIntegrity();

const savedUiTheme = localStorage.getItem('ui-theme');
const preferredDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;

function setUiTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('ui-theme', theme);
}

function initUiTheme() {
    const initialTheme = savedUiTheme === 'dark' || savedUiTheme === 'light'
        ? savedUiTheme
        : (preferredDark ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', initialTheme);
}

initUiTheme();

document.getElementById('themeToggle').addEventListener('click', () => {
    const current = document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
    setUiTheme(current === 'dark' ? 'light' : 'dark');
});

const themePresets = {
    dark: { bg: '0d1117', text: 'c9d1d9', title: '58a6ff', muted: '8b949e', star: 'e3b341', border: '30363d' },
    light: { bg: 'ffffff', text: '24292f', title: '0969da', muted: '57606a', star: 'bf8700', border: 'd0d7de' },
    dimmed: { bg: '22272e', text: 'adbac7', title: '539bf5', muted: '768390', star: 'd29922', border: '444c56' },
    night: { bg: '0b1320', text: 'd8e5ff', title: '4ea1ff', muted: '89a4d6', star: 'ffd166', border: '1d3557', shadow: '000000' },
    transparent: { bg: '000000', text: 'ffffff', title: 'ffffff', muted: 'd1d5db', star: 'ffd166', border: '000000', shadow: '000000', transparent: true }
};

let currentLang = 'en';
const columnLabels = {
    pr: 'showPullsLabel',
    date: 'showDateLabel',
    lang: 'showLangLabel',
    changes: 'showChangesLabel'
};

let columnOrderState = [
    { key: 'pr', enabled: true },
    { key: 'date', enabled: true },
    { key: 'lang', enabled: false },
    { key: 'changes', enabled: false }
];

function getLabelForColumn(key) {
    const i18nKey = columnLabels[key];
    return i18n[currentLang][i18nKey] || key;
}

function moveColumn(key, direction) {
    const idx = columnOrderState.findIndex((item) => item.key === key);
    if (idx < 0) return;
    const targetIdx = idx + direction;
    if (targetIdx < 0 || targetIdx >= columnOrderState.length) return;
    const [item] = columnOrderState.splice(idx, 1);
    columnOrderState.splice(targetIdx, 0, item);
    renderColumnOrderList();
}

function setColumnEnabled(key, enabled) {
    const item = columnOrderState.find((col) => col.key === key);
    if (!item) return;
    item.enabled = enabled;
}

function renderColumnOrderList() {
    const list = document.getElementById('columnOrderList');
    if (!list) return;
    list.innerHTML = '';

    columnOrderState.forEach((item, idx) => {
        const row = document.createElement('div');
        row.className = 'column-order-item';

        const left = document.createElement('div');
        left.className = 'checkbox-row';

        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.id = `col-${item.key}`;
        checkbox.checked = item.enabled;
        checkbox.addEventListener('change', (e) => setColumnEnabled(item.key, e.target.checked));

        const label = document.createElement('label');
        label.setAttribute('for', checkbox.id);
        label.textContent = getLabelForColumn(item.key);

        left.appendChild(checkbox);
        left.appendChild(label);

        const actions = document.createElement('div');
        actions.className = 'order-actions';

        const upBtn = document.createElement('button');
        upBtn.type = 'button';
        upBtn.className = 'order-btn';
        upBtn.textContent = '▲';
        upBtn.disabled = idx === 0;
        upBtn.addEventListener('click', () => moveColumn(item.key, -1));

        const downBtn = document.createElement('button');
        downBtn.type = 'button';
        downBtn.className = 'order-btn';
        downBtn.textContent = '▼';
        downBtn.disabled = idx === columnOrderState.length - 1;
        downBtn.addEventListener('click', () => moveColumn(item.key, 1));

        actions.appendChild(upBtn);
        actions.appendChild(downBtn);

        row.appendChild(left);
        row.appendChild(actions);
        list.appendChild(row);
    });
}

function switchLanguage(lang) {
    if (!i18n[lang]) return;
    currentLang = lang;
    document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (i18n[lang][key]) el.textContent = i18n[lang][key];
    });
    renderColumnOrderList();
}

function setupColorSync(pickerId, hexId) {
    const picker = document.getElementById(pickerId);
    const hex = document.getElementById(hexId);
    picker.addEventListener('input', () => {
        hex.value = picker.value.substring(1);
        document.getElementById('themePreset').value = 'custom';
    });
    hex.addEventListener('input', () => {
        const v = hex.value.replace(/[^a-fA-F0-9]/g, '').slice(0, 6);
        hex.value = v;
        if (v.length === 6) picker.value = '#' + v;
        document.getElementById('themePreset').value = 'custom';
    });
}

function setColor(name, value) {
    document.getElementById(`${name}Color`).value = value;
    document.getElementById(`${name}ColorPicker`).value = '#' + value;
}

function applyThemePreset(name) {
    if (!themePresets[name]) return;
    const t = themePresets[name];
    setColor('bg', t.bg);
    setColor('text', t.text);
    setColor('title', t.title);
    setColor('muted', t.muted);
    setColor('star', t.star);
    setColor('border', t.border);
    setColor('shadow', t.shadow || '000000');
}

['bg', 'text', 'title', 'muted', 'star', 'border', 'shadow'].forEach((name) => setupColorSync(`${name}ColorPicker`, `${name}Color`));
applyThemePreset('dark');
renderColumnOrderList();

function updatePreviewWindowSize() {
    const height = Math.min(580, Math.max(120, parseInt(document.getElementById('previewHeight').value, 10) || 220));
    document.getElementById('previewArea').style.minHeight = `${height}px`;
}

document.getElementById('previewHeight').addEventListener('input', updatePreviewWindowSize);
updatePreviewWindowSize();

function buildBadgeUrl() {
    const username = document.getElementById('username').value.trim() || 'OstinUA';
    const limit = document.getElementById('limit').value;
    const badgeWidth = document.getElementById('badgeWidth').value;
    const rowHeight = document.getElementById('rowHeight').value;
    const repoWidth = document.getElementById('repoWidth').value;
    const langWidth = document.getElementById('langWidth').value;
    const prWidth = document.getElementById('prWidth').value;
    const dateWidth = document.getElementById('dateWidth').value;
    const changesWidth = document.getElementById('changesWidth').value;
    const starsWidth = document.getElementById('starsWidth').value;
    const bgColor = document.getElementById('bgColor').value;
    const textColor = document.getElementById('textColor').value;
    const titleColor = document.getElementById('titleColor').value;
    const mutedColor = document.getElementById('mutedColor').value;
    const starColor = document.getElementById('starColor').value;
    const borderColor = document.getElementById('borderColor').value;
    const shadowColor = document.getElementById('shadowColor').value;
    const uniqueRepos = document.getElementById('uniqueRepos').checked;
    const showRejected = document.getElementById('showRejected').checked;
    const repoNameFormat = document.getElementById('repoNameFormat').value;

    const customTitleVal = document.getElementById('customTitle').value.trim();
    const byKey = Object.fromEntries(columnOrderState.map((item) => [item.key, item.enabled]));
    const colOrder = columnOrderState.map((item) => item.key).join(',');

    const params = new URLSearchParams();
    params.set('username', username);
    if (limit !== '7') params.set('limit', limit);
    params.set('show_pr', byKey.pr ? 'true' : 'false');
    params.set('show_date', byKey.date ? 'true' : 'false');
    params.set('show_lang', byKey.lang ? 'true' : 'false');
    params.set('show_changes', byKey.changes ? 'true' : 'false');
    if (uniqueRepos) params.set('unique_repos', 'true');
    if (showRejected) params.set('show_rejected', 'true');
    if (repoNameFormat !== 'full') params.set('repo_name_format', repoNameFormat);
    params.set('col_order', colOrder);
    if (badgeWidth !== '830') params.set('badge_width', badgeWidth);
    if (rowHeight !== '40') params.set('row_height', rowHeight);
    if (repoWidth !== '180') params.set('repo_width', repoWidth);
    if (langWidth !== '80') params.set('lang_width', langWidth);
    if (prWidth !== '320') params.set('pr_width', prWidth);
    if (dateWidth !== '90') params.set('date_width', dateWidth);
    if (changesWidth !== '100') params.set('changes_width', changesWidth);
    if (starsWidth !== '60') params.set('stars_width', starsWidth);
    if (customTitleVal) params.set('custom_title', customTitleVal);
    if (bgColor !== themePresets.dark.bg) params.set('bg_color', bgColor);
    if (textColor !== themePresets.dark.text) params.set('text_color', textColor);
    if (titleColor !== themePresets.dark.title) params.set('title_color', titleColor);
    if (mutedColor !== themePresets.dark.muted) params.set('muted_color', mutedColor);
    if (starColor !== themePresets.dark.star) params.set('star_color', starColor);
    if (borderColor !== themePresets.dark.border) params.set('border_color', borderColor);
    if (shadowColor !== '000000') params.set('shadow_color', shadowColor);
    if (document.getElementById('themePreset').value === 'transparent') params.set('transparent', 'true');

    return { url: `${window.location.origin}/api/badge?${params.toString()}` };
}

function generate() {
    const { url } = buildBadgeUrl();
    const badge = document.getElementById('badge');
    const spinner = document.getElementById('spinner');
    const placeholder = document.getElementById('previewPlaceholder');
    const btn = document.getElementById('generateBtn');
    const errorEl = document.getElementById('previewError');

    badge.style.display = 'none';
    placeholder.style.display = 'none';
    spinner.style.display = 'block';
    btn.disabled = true;
    if (errorEl) errorEl.remove();

    const targetUrl = 'https://github.com/readme-SVG/readme-pr-contributors-rating';
    const mdText = `[![Top PRs](${url})](${targetUrl})`;
    document.getElementById('markdownCode').textContent = mdText;

    const img = new Image();
    img.onload = () => {
        badge.src = url;
        badge.style.display = 'block';
        spinner.style.display = 'none';
        btn.disabled = false;
    };
    img.onerror = () => {
        spinner.style.display = 'none';
        btn.disabled = false;
        const err = document.createElement('div');
        err.className = 'error-msg';
        err.id = 'previewError';
        err.textContent = i18n[currentLang].errorFetch;
        document.getElementById('previewArea').appendChild(err);
    };
    img.src = url;
}

async function copyMarkdown() {
    const text = document.getElementById('markdownCode').textContent;
    if (!text || text === '-') return;
    try {
        await navigator.clipboard.writeText(text);
        const btn = document.getElementById('copyBtn');
        const span = btn.querySelector('[data-i18n="copyBtn"]');
        span.textContent = i18n[currentLang].copiedBtn;
        btn.classList.add('copied');
        setTimeout(() => {
            span.textContent = i18n[currentLang].copyBtn;
            btn.classList.remove('copied');
        }, 2000);
    } catch (_) {}
}
</script>
</body>
</html>
